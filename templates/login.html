<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SPARK</title>
  <link rel="icon" type="image/png" href="/static/images/spark-favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#070b12;--glass:rgba(255,255,255,0.04);--glass-b:rgba(255,255,255,0.07);--blue:#3b82f6;--blue-g:#60a5fa;--cyan:#22d3ee;--accent:#a78bfa;--text:#e2e8f0;--muted:#64748b;--border:rgba(255,255,255,0.07);--red:#f87171;--font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-weight:300;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:0.4;}
    .orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(100px);}
    .orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(59,130,246,0.15),transparent 70%);top:-150px;left:-100px;}
    .orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(167,139,250,0.1),transparent 70%);bottom:-100px;right:-80px;}

    /* TOP BAR */
    .topbar{position:relative;z-index:10;padding:20px 40px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
    .topbar a{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .topbar img{height:32px;}
    .topbar-name{font-family:var(--font-d);font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.5px;}
    .topbar-name span{color:var(--cyan);}

    /* AUTH LAYOUT */
    .auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1;}
    .auth-card{width:100%;max-width:420px;}

    /* HEADER */
    .auth-header{text-align:center;margin-bottom:36px;}
    .auth-icon{width:64px;height:64px;border-radius:18px;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;}
    .auth-header h1{font-family:var(--font-d);font-size:28px;font-weight:800;letter-spacing:-0.8px;margin-bottom:8px;}
    .auth-header p{font-size:14px;color:var(--muted);}

    /* FORM BOX */
    .form-box{background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:32px;backdrop-filter:blur(16px);position:relative;overflow:hidden;}
    .form-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0.5),transparent);}

    .field{margin-bottom:18px;}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;font-family:var(--font-d);}
    .field-wrap{position:relative;}
    .field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;opacity:0.5;pointer-events:none;}
    .field input{width:100%;padding:13px 14px 13px 42px;border-radius:12px;background:rgba(0,0,0,0.35);border:1px solid var(--border);color:var(--text);font-family:var(--font-b);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s;}
    .field input:focus{border-color:rgba(59,130,246,0.5);box-shadow:0 0 0 3px rgba(59,130,246,0.08);}
    .field input::placeholder{color:var(--muted);}

    .submit-btn{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-family:var(--font-d);font-size:15px;font-weight:700;border:none;cursor:pointer;margin-top:8px;transition:transform .2s,box-shadow .2s;box-shadow:0 0 24px rgba(59,130,246,0.3);letter-spacing:0.3px;}
    .submit-btn:hover{transform:translateY(-1px);box-shadow:0 0 36px rgba(59,130,246,0.5);}
    .submit-btn:active{transform:translateY(0);}

    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .divider span{font-size:12px;color:var(--muted);}

    .alt-link{text-align:center;font-size:14px;color:var(--muted);}
    .alt-link a{color:var(--blue-g);text-decoration:none;font-weight:500;transition:color .2s;}
    .alt-link a:hover{color:var(--cyan);}

    .error-msg{display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:10px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:var(--red);font-size:13px;margin-top:16px;font-weight:500;}
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="topbar">
    <a href="/">
      <img src="/static/images/spark-logo.png" alt="SPARK">
      <span class="topbar-name">SPARK<span>.</span></span>
    </a>
  </div>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">🔐</div>
        <h1>Welcome back</h1>
        <p>Sign in to access your SPARK dashboard</p>
      </div>

      <div class="form-box">
        <form method="POST">
          <div class="field">
            <label>Username</label>
            <div class="field-wrap">
              <span class="field-icon">👤</span>
              <input type="text" name="username" placeholder="Enter your username" required autocomplete="username">
            </div>
          </div>
          <div class="field">
            <label>Password</label>
            <div class="field-wrap">
              <span class="field-icon">🔑</span>
              <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
          </div>
          <button type="submit" class="submit-btn">Sign In →</button>
        </form>

        <div class="divider"><span>or</span></div>
        <div class="alt-link">Don't have an account? <a href="/register">Create one</a></div>

        {% if error %}
          <div class="error-msg">⚠ {{ error }}</div>
        {% endif %}
      </div>
    </div>
  </div>
</body>
</html>
